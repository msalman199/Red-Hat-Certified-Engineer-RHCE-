---
- name: SSH Security Configuration
  hosts: all
  become: yes
  
  tasks:
    - name: Backup original SSH configuration
      copy:
        src: /etc/ssh/sshd_config
        dest: /etc/ssh/sshd_config.backup
        remote_src: yes
        backup: yes

    - name: Configure SSH security settings
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        backup: yes
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
        - { regexp: '^#?Protocol', line: 'Protocol 2' }
        - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
        - { regexp: '^#?ClientAliveInterval', line: 'ClientAliveInterval 300' }
        - { regexp: '^#?ClientAliveCountMax', line: 'ClientAliveCountMax 2' }
        - { regexp: '^#?LoginGraceTime', line: 'LoginGraceTime 60' }
        - { regexp: '^#?Banner', line: 'Banner /etc/issue.net' }
        - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
      notify: restart sshd

    - name: Allow specific users SSH access
      lineinfile:
        path: /etc/ssh/sshd_config
        line: "AllowUsers secadmin webadmin ansible"
        insertafter: EOF
      notify: restart sshd

    - name: Deny specific groups SSH access
      lineinfile:
        path: /etc/ssh/sshd_config
        line: "DenyGroups games ftp"
        insertafter: EOF
      notify: restart sshd

    - name: Validate SSH configuration
      command: sshd -t
      changed_when: false

  handlers:
    - name: restart sshd
      systemd:
        name: sshd
        state: restarted
