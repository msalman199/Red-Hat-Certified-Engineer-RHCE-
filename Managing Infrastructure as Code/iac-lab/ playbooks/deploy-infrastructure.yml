---
- name: Deploy Web Infrastructure
  hosts: all
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Update system packages
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
    
    - name: Install common packages
      apt:
        name:
          - curl
          - wget
          - htop
          - vim
          - git
        state: present
      when: ansible_os_family == "Debian"

- name: Configure Web Servers
  hosts: webservers
  become: yes
  
  tasks:
    - name: Install Apache web server
      apt:
        name: apache2
        state: present
    
    - name: Start and enable Apache service
      systemd:
        name: apache2
        state: started
        enabled: yes
    
    - name: Configure firewall for web traffic
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "80"
        - "443"
        - "22"
    
    - name: Create web content directory
      file:
        path: /var/www/html/app
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

- name: Configure Database Servers
  hosts: databases
  become: yes
  
  tasks:
    - name: Install MySQL server
      apt:
        name:
          - mysql-server
          - python3-pymysql
        state: present
    
    - name: Start and enable MySQL service
      systemd:
        name: mysql
        state: started
        enabled: yes
    
    - name: Configure firewall for database traffic
      ufw:
        rule: allow
        port: "3306"
        proto: tcp
        src: "192.168.1.0/24"

- name: Configure Load Balancer
  hosts: loadbalancers
  become: yes
  
  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
    
    - name: Start and enable Nginx service
      systemd:
        name: nginx
        state: started
        enabled: yes
    
    - name: Configure firewall for load balancer
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "80"
        - "443"
        - "22"
