---
all:
  children:
    webservers:
      hosts:
        web01.prod.company.com:
          ansible_host: 10.0.1.10
          server_id: web01
          datacenter: east
        web02.prod.company.com:
          ansible_host: 10.0.1.11
          server_id: web02
          datacenter: west
      vars:
        http_port: 80
        https_port: 443
        
    databases:
      hosts:
        db01.prod.company.com:
          ansible_host: 10.0.2.10
          server_id: db01
          datacenter: east
          db_role: master
        db02.prod.company.com:
          ansible_host: 10.0.2.11
          server_id: db02
          datacenter: west
          db_role: slave
      vars:
        mysql_port: 3306
        
    loadbalancers:
      hosts:
        lb01.prod.company.com:
          ansible_host: 10.0.3.10
          server_id: lb01
          datacenter: east
          
  vars:
    environment: production
    backup_enabled: true
    monitoring_enabled: true
