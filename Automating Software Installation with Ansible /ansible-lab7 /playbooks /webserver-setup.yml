---
- name: Configure Web Servers with Apache and PHP
  hosts: webservers
  become: yes
  gather_facts: yes
  
  vars:
    web_packages:
      - httpd
      - php
      - php-mysql
      - php-fpm
      - mod_ssl
    
    apache_service: httpd
    
  tasks:
    - name: Install web server packages
      dnf:
        name: "{{ web_packages }}"
        state: present
      notify: restart apache
    
    - name: Start and enable Apache service
      systemd:
        name: "{{ apache_service }}"
        state: started
        enabled: yes
    
    - name: Configure firewall for HTTP and HTTPS
      firewalld:
        service: "{{ item }}"
        permanent: yes
        state: enabled
        immediate: yes
      loop:
        - http
        - https
      ignore_errors: yes
    
    - name: Create a simple index.html
      copy:
        content: |
          <html>
          <head><title>Ansible Managed Server</title></head>
          <body>
          <h1>Welcome to {{ inventory_hostname }}</h1>
          <p>This server was configured by Ansible</p>
          <p>Server IP: {{ ansible_default_ipv4.address }}</p>
          </body>
          </html>
        dest: /var/www/html/index.html
        owner: apache
        group: apache
        mode: '0644'
      notify: restart apache
  
  handlers:
    - name: restart apache
      systemd:
        name: "{{ apache_service }}"
        state: restarted
EOF
