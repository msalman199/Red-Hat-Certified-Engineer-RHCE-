---
- name: Security Hardening for Environment
  hosts: all
  become: yes
  
  tasks:
    - name: Display security hardening info
      debug:
        msg: |
          Applying security hardening for {{ environment_name }}
          Environment-specific security rules will be applied
      tags:
        - info
        - security

    - name: Update all packages
      package:
        name: "*"
        state: latest
      when: environment_name != "production"
      tags:
        - security
        - updates

    - name: Configure SSH security
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        backup: yes
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
      notify: restart ssh
      tags:
        - security
        - ssh

    - name: Install and configure fail2ban
      package:
        name: fail2ban
        state: present
      tags:
        - security
        - fail2ban

    - name: Configure fail2ban for SSH
      template:
        src: fail2ban_ssh.j2
        dest: /etc/fail2ban/jail.d/ssh.conf
        mode: '0644'
      notify: restart fail2ban
      tags:
        - security
        - fail2ban

  handlers:
    - name: restart ssh
      systemd:
        name: sshd
        state: restarted

    - name: restart fail2ban
      systemd:
        name: fail2ban
        state: restarted
EOF
